name: Deploy VitePress site to Pages

on:
  push:
    branches: [main] # Change to 'master' if that is your default branch
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required if you use VitePress's lastUpdated feature

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18 # Matching your Docker build stage
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Install dependencies
        run: npm ci # Uses clean install for reliable builds

      - name: Build with VitePress
        run: npm run build # Matching your Dockerfile command

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Custom path based on your repository root setup
          path: .vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4